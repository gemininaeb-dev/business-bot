{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block fullpage %}
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-big"><i class="bi bi-shop"></i></div>
    <h4 class="text-center" style="font-weight:700;margin-bottom:4px;">{{ business_name }}</h4>
    <p class="text-center muted" style="margin-bottom:24px;">Панель управления</p>
    {% if error %}
    <div class="alert-m alert-danger-m">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="login" class="form-control" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-m btn-primary-m" style="width:100%;justify-content:center;margin-top:6px;">
        <i class="bi bi-box-arrow-in-right"></i> Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}
